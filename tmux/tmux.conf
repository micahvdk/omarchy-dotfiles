# ~/.config/tmux/tmux.conf
# Lean tmux config — no plugin manager, works out of the box.

# ---------- core ----------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB,alacritty:RGB,xterm-ghostty:RGB"
set -g escape-time 10
set -g history-limit 100000
set -g focus-events on
set -g mouse on
set -g set-clipboard on

# ---------- prefix: C-b (tmux default) ----------
set -g prefix C-b
bind C-b send-prefix

# ---------- windows & panes ----------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on

# Intuitive split keys — keep working directory
bind '_' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind c   new-window   -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation (arrow-key defaults disabled)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
unbind Left
unbind Down
unbind Up
unbind Right

# Resize panes (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------- copy mode (vi) ----------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# ---------- reload ----------
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"

# ---------- status bar ----------
# Uses terminal default colours so it inherits the active Omarchy theme.
set -g status-interval 5
set -g status-position bottom
set -g status-style         "bg=default fg=white"
set -g status-left-length  40
set -g status-right-length 80
set -g status-left  "#[bold] #S #[default]│ "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "
set -g window-status-current-style "bold,fg=green"
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-style         "fg=brightblack"
set -g pane-active-border-style  "fg=green"
set -g message-style             "bg=default fg=yellow"
