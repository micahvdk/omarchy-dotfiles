# Personal Hyprland overrides — sourced after Omarchy defaults and after
# ~/.config/hypr/input.conf, so values set here win.

input {
  # Remap Caps Lock → Escape (nicer for vim/tmux).
  # Overrides Omarchy's default `compose:caps`.
  kb_options = caps:escape
}

# Start gnome-keyring-daemon with the SSH and Secret Service components so
# SSH keys are cached across the session (Apple Keychain-style). PAM unlocks
# the keyring at login; see install.sh for the PAM configuration.
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets,ssh
